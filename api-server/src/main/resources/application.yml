server:
  port: ${PORT:8080}

qiita:
  token: ${QIITA_TOKEN}
  per-page: 20
  page: 1

trend:
  top-n: 10

spring:
  jackson:
    time-zone: Asia/Tokyo
  
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: never